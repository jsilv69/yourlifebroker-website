# Fly.io config — YourLifeBroker website + Monday lead endpoint
# Deploy:  fly launch --no-deploy            (first time, to create the app)
#          fly secrets set MONDAY_TOKEN=... MONDAY_BOARD_ID=...
#          fly deploy

app = "yourlifebroker-website"
primary_region = "ord"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  grace_period = "5s"
  interval = "30s"
  method = "GET"
  path = "/healthz"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
